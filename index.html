<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ruta Hacking Ético — Charlie</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Pantalla de login -->
  <div id="login-screen" class="screen">
    <div class="login-box">
      <p class="eyebrow">ruta_hacking_etico.log</p>
      <h1>Panel de progreso</h1>
      <p class="subtitle">Tu plan de estudio de ciberseguridad y hacking ético, guardado en la nube.</p>
      <button id="google-login-btn" class="btn-primary">
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#FFC107" d="M43.6 20.5H42V20.4H24v7.2h11.3c-1.6 4.6-6 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.4-5.4C34.5 5.9 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6 4.4C13.9 15.2 18.6 12 24 12c3.1 0 5.9 1.2 8 3.1l5.4-5.4C34.5 5.9 29.5 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.4 0 10.3-1.9 14-5.6l-6.4-5.4c-2 1.4-4.6 2.3-7.6 2.3-5.3 0-9.7-3.4-11.3-8.1l-6.2 4.7C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20.4H24v7.2h11.3c-.8 2.3-2.2 4.2-4.1 5.6l6.4 5.4C41.5 35.5 44 30.2 44 24c0-1.3-.1-2.7-.4-3.5z"/></svg>
        Entrar con Google
      </button>
      <p id="login-error" class="error-text"></p>
    </div>
  </div>

  <!-- App principal -->
  <div id="app-screen" class="screen hidden">
    <header class="topbar">
      <div>
        <p class="eyebrow">ruta_hacking_etico.log</p>
        <h1>Panel de progreso</h1>
      </div>
      <div class="topbar-right">
        <div class="pct-display">
          <div id="pct" class="pct-number">0%</div>
          <div class="pct-label">completado</div>
        </div>
        <button id="logout-btn" class="btn-ghost">Salir</button>
      </div>
    </header>

    <div class="progress-track">
      <div id="bar" class="progress-fill"></div>
    </div>

    <div id="sync-status" class="sync-status">Sincronizado</div>

    <div id="phases"></div>

    <div class="footer-actions">
      <button id="reset-btn" class="btn-ghost">Reiniciar progreso</button>
    </div>
  </div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
