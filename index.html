<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ruta Hacking Ético — Charlie</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Pantalla de login -->
  <div id="login-screen" class="screen">
    <div class="login-box">
      <p class="eyebrow">ruta_hacking_etico.log</p>
      <h1>Panel de progreso</h1>
      <p class="subtitle">Tu plan de estudio de ciberseguridad y hacking ético, guardado en la nube.</p>

      <div id="login-form">
        <input type="email" id="email-input" placeholder="tu@correo.com" class="text-input" />
        <button id="send-link-btn" class="btn-primary">Enviarme link de acceso</button>
      </div>

      <div id="link-sent-msg" class="hidden">
        <p class="subtitle">Revisá tu correo — te mandamos un link para entrar. Abrilo desde este mismo navegador.</p>
      </div>

      <p id="login-error" class="error-text"></p>
    </div>
  </div>

  <!-- App principal -->
  <div id="app-screen" class="screen hidden">
    <header class="topbar">
      <div>
        <p class="eyebrow">ruta_hacking_etico.log</p>
        <h1>Panel de progreso</h1>
      </div>
      <div class="topbar-right">
        <div class="pct-display">
          <div id="pct" class="pct-number">0%</div>
          <div class="pct-label">completado</div>
        </div>
        <button id="logout-btn" class="btn-ghost">Salir</button>
      </div>
    </header>

    <div class="progress-track">
      <div id="bar" class="progress-fill"></div>
    </div>

    <div id="sync-status" class="sync-status">Sincronizado</div>

    <div id="phases"></div>

    <div class="footer-actions">
      <button id="reset-btn" class="btn-ghost">Reiniciar progreso</button>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-config.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
